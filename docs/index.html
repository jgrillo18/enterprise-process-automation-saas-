<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Enterprise Automation SaaS Demo</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <span class="navbar-brand mb-0 h1">Enterprise Automation SaaS</span>
    </nav>

    <div id="loginScreen" class="container py-4">
        <div class="card mx-auto" style="max-width:400px;">
            <h2 class="text-center">Iniciar Sesión (demo)</h2>
            <form id="loginForm" onsubmit="login(event)">
                <input class="form-control" type="text" id="username" placeholder="Usuario" autocomplete="username" required>
                <input class="form-control" type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required>
                <button class="btn btn-primary w-100 mt-2" type="submit">Entrar</button>
            </form>
            <p class="text-muted small mt-2">Prueba con <strong>admin/admin</strong></p>
        </div>
    </div>

    <div id="dashboardScreen" class="container py-4" style="display:none;">
        <div class="mb-4">
            <h1 class="display-6">Panel de control</h1>
            <p class="lead">Bienvenido, <span id="userLabel"></span>!</p>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="card p-3 text-center">
                    <h5>Procesos <span class="badge bg-primary">3</span></h5>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 text-center">
                    <h5>Usuarios <span class="badge bg-secondary">1</span></h5>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <button class="btn btn-outline-danger" onclick="logout()">Cerrar sesión</button>
        </div>
    </div>

    <script src="app.js"></script>
    <!-- demo published at GitHub Pages -->
</body>
</html>
